services:
  chordvault:
    build: .
    container_name: chordvault
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
